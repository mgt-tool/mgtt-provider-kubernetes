meta:
  name: kubernetes
  version: 2.3.1
  description: Kubernetes cluster resources — workloads, networking, storage, RBAC, webhooks, and scheduling
  requires:
    mgtt: ">=0.1.2"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-kubernetes"

hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

variables:
  namespace:
    description: kubernetes namespace
    required: false
    default: default

auth:
  strategy: environment
  reads_from: [KUBECONFIG, ~/.kube/config, in-cluster service account]
  access:
    probes: kubectl read-only
    writes: none

# Capabilities the image-installed form of this provider needs mgtt to
# forward at probe time. See mgtt docs/reference/image-capabilities.md.
image:
  needs: [kubectl, network]
