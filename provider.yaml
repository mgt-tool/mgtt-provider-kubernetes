meta:
  name: kubernetes
  version: 2.3.1
  description: Kubernetes cluster resources — workloads, networking, storage, RBAC, webhooks, and scheduling
  requires:
    mgtt: ">=0.1.2"
  command: "$MGTT_PROVIDER_DIR/bin/mgtt-provider-kubernetes"

# Capabilities the provider needs at probe time — host packages
# and credential chains. Image installs satisfy these via docker-run
# bind mounts and env forwards; git installs inherit them from the
# operator's shell. `network:` is a separate runtime-isolation knob.
# See mgtt docs/reference/image-capabilities.md for the vocabulary.
needs: [kubectl]
network: host
hooks:
  install: hooks/install.sh
  uninstall: hooks/uninstall.sh

variables:
  namespace:
    description: kubernetes namespace
    required: false
    default: default

auth:
  strategy: environment
  reads_from: [KUBECONFIG, ~/.kube/config, in-cluster service account]
  access:
    probes: kubectl read-only
    writes: none
