# Three-tier demo: configmap → deployment (mounts it) → service → endpoints.
# Shows the full dependency chain the engine is designed to walk.
apiVersion: v1
kind: Namespace
metadata:
  name: mgtt-it-cascade
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: mgtt-it-cascade
data:
  greeting: "hello from cascade"
  backend_url: "http://localhost:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mgtt-it-cascade
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: cfg
              mountPath: /etc/api
          resources:
            requests: {memory: "32Mi", cpu: "50m"}
            limits:   {memory: "64Mi", cpu: "100m"}
      volumes:
        - name: cfg
          configMap:
            name: api-config
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: mgtt-it-cascade
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
