# operator — a Kubernetes operator Deployment plus (optionally) a CRD
# it owns and an admission webhook it serves.
#
# Variables consumed (set in the model as meta.vars or component.vars):
#   namespace   — namespace the operator Deployment lives in.
#                 Mgtt forwards meta.vars.namespace (or a component-level
#                 override) as the probe's --namespace flag.
#   crd         — OPTIONAL. Full CRD name (e.g. externalsecrets.external-secrets.io).
#                 When unset, crd_registered always returns true.
#   webhook     — OPTIONAL. Name of the ValidatingWebhookConfiguration or
#                 MutatingWebhookConfiguration this operator serves. When
#                 unset, webhook_healthy always returns true.
#
# The component key is treated as the operator Deployment name; if the
# real Deployment has a different name, set the component's `resource:`
# field.

facts:
  deployment_ready:
    type: mgtt.bool
    ttl: 30s
    description: whether the operator's Deployment has ≥1 ready replica and reports condition Available=True
    probe:
      cmd: "kubectl -n {namespace} get deploy {name} -o json"
      parse: bool
      cost: low

  crd_registered:
    type: mgtt.bool
    ttl: 60s
    description: whether the cluster-scoped CustomResourceDefinition named by --crd exists; returns true when --crd is unset
    probe:
      cmd: "kubectl get customresourcedefinition {crd}"
      parse: bool
      cost: low

  webhook_healthy:
    type: mgtt.bool
    ttl: 30s
    description: whether the webhook config named by --webhook (tried as validating then mutating) has a backend service with ready endpoints; returns true when --webhook is unset
    probe:
      cmd: "kubectl get {validating|mutating}webhookconfiguration {webhook} && kubectl -n <svc-ns> get endpoints <svc-name>"
      parse: bool
      cost: medium

  restart_count:
    type: mgtt.int
    ttl: 30s
    description: max container restart count across pods selected by app={name}
    probe:
      cmd: "kubectl -n {namespace} get pods -l app={name} -o json"
      parse: int
      cost: low

healthy:
  - deployment_ready == true
  - crd_registered == true

states:
  crd_missing:
    when: "crd_registered == false"
    description: custom resource definition not registered
  not_running:
    when: "deployment_ready == false"
    description: operator deployment not available
  degraded:
    when: "restart_count > 3"
    description: operator pod restarting frequently
  ready:
    when: "deployment_ready == true & crd_registered == true"
    description: operator running and CRD registered

default_active_state: ready

failure_modes:
  crd_missing:
    can_cause: [upstream_failure, deployment_blocked]
  not_running:
    can_cause: [upstream_failure, deployment_blocked]
  degraded:
    can_cause: [upstream_failure, timeout]
