facts:
  exists:
    type: mgtt.bool
    ttl: 60s
    probe:
      cmd: "kubectl -n {namespace} get limitrange {name} -o jsonpath={.metadata.name}"
      parse: "regex:.+"
      cost: low
  default_cpu_limit:
    type: mgtt.string
    ttl: 60s
    description: default CPU limit (kubectl quantity, e.g. "500m")
    probe:
      cmd: "kubectl -n {namespace} get limitrange {name} -o jsonpath={.spec.limits[0].default.cpu}"
      parse: string
      cost: low
  default_memory_limit:
    type: mgtt.string
    ttl: 60s
    description: default memory limit (kubectl quantity, e.g. "512Mi")
    probe:
      cmd: "kubectl -n {namespace} get limitrange {name} -o jsonpath={.spec.limits[0].default.memory}"
      parse: string
      cost: low

healthy:
  - exists == true

states:
  missing:
    when: "exists == false"
    description: limit range not defined
  active:
    when: "exists == true"
    description: limit range in effect

default_active_state: active

failure_modes:
  missing:
    can_cause: [resource_contention]
