facts:
  exists:
    type: mgtt.bool
    ttl: 60s
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.metadata.name}"
      parse: "regex:.+"
      cost: low
  # Quantities are strings (e.g. "500m", "2Gi") because kubectl returns them
  # verbatim and operators recognize the form. Runtime returns the same. For
  # numeric comparisons, use pods_* (integers) instead.
  cpu_used:
    type: mgtt.string
    ttl: 30s
    description: CPU used (kubectl quantity, e.g. "500m")
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.used.requests\\.cpu}"
      parse: string
      cost: low
  cpu_hard:
    type: mgtt.string
    ttl: 60s
    description: CPU limit (kubectl quantity)
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.hard.requests\\.cpu}"
      parse: string
      cost: low
  memory_used:
    type: mgtt.string
    ttl: 30s
    description: memory used (kubectl quantity, e.g. "256Mi")
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.used.requests\\.memory}"
      parse: string
      cost: low
  memory_hard:
    type: mgtt.string
    ttl: 60s
    description: memory limit (kubectl quantity)
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.hard.requests\\.memory}"
      parse: string
      cost: low
  pods_used:
    type: mgtt.int
    ttl: 30s
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.used.pods}"
      parse: int
      cost: low
  pods_hard:
    type: mgtt.int
    ttl: 60s
    probe:
      cmd: "kubectl -n {namespace} get resourcequota {name} -o jsonpath={.status.hard.pods}"
      parse: int
      cost: low

healthy:
  - pods_used < pods_hard

states:
  missing:
    when: "exists == false"
    description: quota not defined
  exhausted:
    when: "pods_used >= pods_hard"
    description: quota fully consumed — new pods will be rejected
  active:
    when: "exists == true"
    description: quota in effect with headroom

default_active_state: active

failure_modes:
  exhausted:
    can_cause: [upstream_failure, deployment_blocked, resource_contention]
